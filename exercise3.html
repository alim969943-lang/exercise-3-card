<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #e4e4e7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;

        }
        
        .card {
            border: 2px solid black;
            border-radius: 12px;
            width: 330px;
            background-color: white;
            overflow: hidden;
            /* box-shadow: 0px 4px 20px rgb(0, 0, 0, 0 .08); */
            padding: 0 15px 15px 15px;
        }

        .tag {
            background-color: #f0f0f0;
            color: #333;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .read {
            background-color: lightblue;
            color: white;
            display: block;
            margin: 10px auto;
            padding: 6px 15px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="card">

        <img src="nature.jpg" width="100%">
        <span class="tag"> nature </span>
        <span class="tag">lake </span>
        <h2>lago di braise</h2>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Maiores temporibus at eveniet minima excepturi
            debitis doloribus porro sint est deserunt.</p>
        <button class="read"> read more </button>
    </div>
</body>

</html>
